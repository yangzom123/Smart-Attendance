<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Tutor Register</title>

    <link rel="stylesheet"
        href="css/register.css">

</head>

<body>

    <div class="register-box">

        <h1>Tutor Register</h1>

        <form id="tutorRegisterForm">

            <input
                type="text"
                id="tutorName"
                placeholder="Full Name"
            >

            <input
                type="text"
                id="tutorId"
                placeholder="Tutor ID"
            >

            <input
                type="email"
                id="tutorEmail"
                placeholder="Email"
            >

            <input
                type="password"
                id="tutorPassword"
                placeholder="Password"
            >

            <input
                type="password"
                id="tutorConfirmPassword"
                placeholder="Confirm Password"
            >

            <button type="submit">
                Register
            </button>

            <p id="message"></p>

        </form>

    </div>

    <script src="js/tutor-register.js"></script>

</body>

</html>
