<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Tutor Login</title>

    <link rel="stylesheet"
        href="css/login.css">

</head>

<body>

    <div class="container">

        <div class="login-box">

            <h1>Tutor Login</h1>

            <form id="tutorLoginForm">

                <div class="input-group">

                    <label>Tutor ID</label>

                    <input
                        type="text"
                        id="tutorId"
                        placeholder="Enter Tutor ID"
                    >

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input
                        type="password"
                        id="tutorPassword"
                        placeholder="Enter Password"
                    >

                </div>

                <button type="submit">
                    Login
                </button>

                <p id="message"></p>

            </form>

        </div>

    </div>

    <script src="js/tutor-login.js"></script>

</body>

</html>
